{{ define "main"}}
<div>
    <div>
        <h1>{{ .Title }}</h1>
    </div>
    <div class="post-list">
        {{ range .Paginator.Pages }}
        <p class="post-list-item"><span class="post-date">{{ .Date.Format "2006-01-02" }}</span> <a href="{{ .RelPermalink }}">{{.Title }}</a></p>
        {{ end }}
    </div>
</div>
{{ end }}
