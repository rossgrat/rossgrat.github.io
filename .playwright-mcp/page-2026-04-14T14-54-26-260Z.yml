      - generic [ref=e26]:
        - heading "Edit - October 9th, 2025" [level=2] [ref=e27]
        - paragraph [ref=e28]: It’s a bit embarassing to look back at this post (even though it was originally posted less than a year ago!) and realize that the “fixed” code isn’t quite fixed. After many months of learning from talented engineers in my new position, and finishing Kleppmann’s Designing Data-Intensive Applications (a.k.a the Bible), I realize that there is actually a read skew condition present in the “fixed” code. The correct fix for this bug is to use transactions and leverage Snapshot Isolation present in Postgres.
        - paragraph [ref=e29]: Live and learn!
        - heading "Original Post" [level=2] [ref=e30]
        - paragraph [ref=e31]: As I enter my last week at my current company, I thought it might be fun to do a quick writeup on the bug that was the hardest for me to track down and fix in the last two and a half years.
        - paragraph [ref=e32]: In the early spring of 2024, I encountered quite the mysterious bug that caused our production monolith server to completely stop responding to and logging requests, seemingly at random. This bug would lock up our server until an engineer manually restarted it. While the investigation process was an ordeal on its own, the main thing I want to focus on in this article is the bug itself.
        - paragraph [ref=e33]:
          - text: Before I explain the bug, I am going to lay it out so you can have a guess. I have recreated the bug in an abbreviated version of the culprit code below. I have omitted the SQL statements, error checking, and database connection pool initialization. All you need to know, besides the code below, is that the Postgres database connection pool is initialized via the
          - code [ref=e34]: jackc/pgxpool/v4
          - text: package and is shared globally among all of the concurrent server threads. Queries are made via the
          - code [ref=e35]: jackc/pgx
          - text: package.
        - code [ref=e38]:
          - generic [ref=e40]: rows, _ := ConnPool.Query()
          - generic [ref=e42]: "for rows.Next(){"
          - generic [ref=e44]: // Scan and process row
          - generic [ref=e46]: newRows, _ := ConnPool.Query()
          - generic [ref=e48]: "for newRows.next() {"
          - generic [ref=e50]: // Scan and process new row
          - generic [ref=e52]: "}"
          - generic [ref=e54]: "}"
        - paragraph [ref=e55]: Do you see the problem? Maybe? What if I rewrite it with mutexes?
        - code [ref=e58]:
          - generic [ref=e60]: mutex.Lock()
          - generic [ref=e62]: "for i := 0; i < 1000; i++ {"
          - generic [ref=e64]: mutex.Lock()
          - generic [ref=e66]: "for j := 0; j < 10; j++ {"
          - generic [ref=e68]: // Do stuff
          - generic [ref=e70]: "}"
          - generic [ref=e72]: mutex.Unlock()
          - generic [ref=e74]: "}"
          - generic [ref=e76]: mutex.Unlock()
        - paragraph [ref=e77]: This is indeed a deadlock caused by a sneaky race condition.
        - paragraph [ref=e78]:
          - text: Upon creation, each database pool accepts a config object that defines important things, but the particularly relevant field for my case was the maximum number of connections field (
          - code [ref=e79]: MaxConns
          - text: ). The definition of this from the
          - code [ref=e80]: pgxpool
          - text: package is below.
        - code [ref=e83]:
          - generic [ref=e85]: // MaxConns is the maximum size of the pool. The default is the greater of 4 or runtime.NumCPU().
          - generic [ref=e87]: MaxConns int32
        - paragraph
        - paragraph [ref=e88]: The production monolith has only four CPU cores, so the maximum number of database connections is 4.
        - paragraph [ref=e89]:
          - text: A database connection is taken from the pool when
          - code [ref=e90]: ConnPool.Query()
          - text: "is called, but the connection is not released back into the pool until either one of two things (to my knowledge) occurs:"
        - list [ref=e91]:
          - listitem [ref=e92]:
            - code [ref=e93]: rows.Close()
            - text: is called on the open
            - code [ref=e94]: rows
            - text: object.
          - listitem [ref=e95]:
            - code [ref=e96]: rows.Next()
            - text: completes iterating over all available rows.
        - paragraph [ref=e97]:
          - text: You can see in the example that there are two
          - code [ref=e98]: ConnPool.Query()
          - text: calls, with one nested under the other. The first
          - code [ref=e99]: rows
          - text: object does not release its connection back into the pool until after the function acquires a second connection from the pool and fully processes it.
        - paragraph [ref=e100]: In the overall context of this bug in our server; on quick, subsequent calls to the endpoint that invoked this database code, four separate threads would each take a database connection before any of them could grab a second connection. This would effectively lock up the database layer, because each of these threads is now waiting for a second database connection, while holding onto their own initial connection.
        - paragraph [ref=e101]: This fix was a simple one.
        - code [ref=e104]:
          - generic [ref=e106]: rows, _ := ConnPool.Query()
          - generic [ref=e108]: var data []any
          - generic [ref=e110]: "for rows.Next(){"
          - generic [ref=e112]: // Scan and process rows into data
          - generic [ref=e114]: "}"
          - generic [ref=e117]: newRows, _ := ConnPool.Query()
          - generic [ref=e119]: "for newRows.next() {"
          - generic [ref=e121]: // Scan and process new rows using data
          - generic [ref=e123]: "}"
        - paragraph
        - paragraph [ref=e124]: Thanks for reading! I’ve also attached some additional links on database connection pools if you want to read a little more about why they are used.
