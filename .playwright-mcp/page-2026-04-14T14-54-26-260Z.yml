        - heading "The Nastiest Bug I Have Fixed (So Far)" [level=1] [ref=e18]
        - generic [ref=e19]:
          - paragraph [ref=e20]: Jan 20, 2025
          - paragraph [ref=e21]:
            - link "technical" [ref=e22] [cursor=pointer]:
              - /url: /tags/technical
            - link "go" [ref=e23] [cursor=pointer]:
              - /url: /tags/go
